<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔑 志工系統 - 帳號登入</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; font-family: "Microsoft JhengHei", sans-serif; }
        .login-card { max-width: 450px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark shadow-sm mb-5">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🏢 收容所後台管理系統</span>
            <a href="/" class="btn btn-outline-light btn-sm">返回民眾認養首頁</a>
        </div>
    </nav>

    <div class="container d-flex justify-content-center">
        <div class="login-card w-100 p-4 mt-4">
            <h3 class="fw-bold text-center text-dark mb-2">🔑 後台系統登入</h3>
            <p class="text-muted text-center small mb-4">請輸入工作信箱與密碼進行驗證</p>
            
            <hr>

            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label fw-bold">工作信箱 (Email)</label>
                    <input type="email" class="form-control" id="login-email" placeholder="example@shelter.gov.tw">
                </div>
                <div class="col-12">
                    <label class="form-label fw-bold">密碼</label>
                    <input type="password" class="form-control" id="login-password" placeholder="請輸入登入密碼">
                </div>
                <div class="col-12 mt-4">
                    <button class="btn btn-success w-100 fw-bold py-2 shadow-sm" onclick="executeLogin()">登入系統 (SELECT 驗證)</button>
                </div>
            </div>
            <div class="text-center mt-3">
                <a href="/register" class="text-primary small text-decoration-none">還沒有帳號？點我前往註冊 📝</a>
            </div>
        </div>
    </div>

    <script>
        function executeLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();

            if(!email || !password) {
                alert('請完整填寫信箱與密碼！');
                return;
            }

            fetch('/api/login_staff', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: password })
            })
            .then(res => res.json())
            .then(result => {
                if(result.success) {
                    alert(result.message);
                    location.href = '/'; // 登入成功，高興地返回首頁
                } else {
                    alert('❌ 登入失敗：' + result.error);
                }
            });
        }
    </script>
</body>
</html>
